name: 测试

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 运行 pipeline 冒烟测试
        run: python scripts/run_pipeline.py --rows 1000 --force-regenerate

      - name: 运行测试
        run: python -m pytest -q
